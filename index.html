<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piticka</title>
    <link rel="stylesheet" href="styles.css" />

</head>
<body>
<div class="wrapper">
    <section class="stats-panel">
        <h3>Celkem piticka</h3>
        <div id="global-stats">
        </div>
    </section>

    <form id="order-form">
        <div class="input-row">
            <select name="name" id="names" required>
                <option value="" disabled selected hidden>Kdo pije?</option>
            </select>
        </div>

        <ul id="drinks">
        </ul>

        <button type="submit" class="submit-btn">Poslat</button>
    </form>
</div>
</body>
</html>
